version: 2

models:
  - name: dim_route
    description: "One row per route_name with the latest known route attributes. Provides corridor/direction metadata and polyline for the app's corridor selector and map preview."
    columns:
      - name: route_name
        data_type: character varying
        description: '{{ doc("route_name") }}'
        data_tests:
          - unique
          - not_null

      - name: corridor
        data_type: character varying
        description: '{{ doc("corridor") }}'

      - name: direction
        data_type: character varying
        description: '{{ doc("direction") }}'

      - name: origin
        data_type: character varying
        description: '{{ doc("origin") }}'

      - name: destination
        data_type: character varying
        description: '{{ doc("destination") }}'

      - name: intermediate
        data_type: character varying
        description: '{{ doc("intermediate") }}'

      - name: description
        data_type: character varying
        description: '{{ doc("description") }}'

      - name: distance_meters
        data_type: integer
        description: '{{ doc("distance_meters") }}'

      - name: encoded_polyline
        data_type: character varying
        description: '{{ doc("encoded_polyline") }}'
