
version: 2

models:
  - name: int_route_traffic_daily
    description: "Incremental snapshot of route traffic records, persisting complete days only (request_date_local < current_date). Used as the historical base for the silver view. Requires --full-refresh when first run after the dt→request_date_local rename."
    columns:
      - name: route_name
        data_type: character varying
        description: '{{ doc("route_name") }}'

      - name: corridor
        data_type: character varying
        description: '{{ doc("corridor") }}'

      - name: direction
        data_type: character varying
        description: '{{ doc("direction") }}'

      - name: origin
        data_type: character varying
        description: '{{ doc("origin") }}'

      - name: destination
        data_type: character varying
        description: '{{ doc("destination") }}'

      - name: intermediate
        data_type: character varying
        description: '{{ doc("intermediate") }}'

      - name: alternative_index
        data_type: integer
        description: '{{ doc("alternative_index") }}'

      - name: description
        data_type: character varying
        description: '{{ doc("description") }}'

      - name: distance_meters
        data_type: integer
        description: '{{ doc("distance_meters") }}'

      - name: duration_seconds
        data_type: integer
        description: '{{ doc("duration_seconds") }}'

      - name: static_duration_seconds
        data_type: integer
        description: '{{ doc("static_duration_seconds") }}'

      - name: encoded_polyline
        data_type: character varying
        description: '{{ doc("encoded_polyline") }}'

      - name: request_time_utc
        data_type: timestamp with time zone
        description: '{{ doc("request_time_utc") }}'

      - name: schedule_name
        data_type: character varying
        description: '{{ doc("schedule_name") }}'

      - name: run_id
        data_type: character varying
        description: '{{ doc("run_id") }}'

      - name: request_date_local
        data_type: date
        description: '{{ doc("request_date_local") }}'

      - name: request_time_local
        data_type: timestamp
        description: '{{ doc("request_time_local") }}'

      - name: day_of_week_name
        data_type: character varying
        description: '{{ doc("day_of_week_name") }}'

      - name: is_weekday
        data_type: boolean
        description: '{{ doc("is_weekday") }}'

      - name: is_holiday
        data_type: boolean
        description: '{{ doc("is_holiday") }}'

      - name: week_start_date_local
        data_type: date
        description: '{{ doc("week_start_date_local") }}'

      - name: slot_local
        data_type: character varying
        description: '{{ doc("slot_local") }}'

      - name: time_window
        data_type: character varying
        description: '{{ doc("time_window") }}'

      - name: expected_poll_count
        data_type: integer
        description: '{{ doc("expected_poll_count") }}'

      - name: delay_seconds
        data_type: integer
        description: '{{ doc("delay_seconds") }}'

      - name: travel_time_index
        data_type: double
        description: '{{ doc("travel_time_index") }}'
