name: dbt docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --no-install-project

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_DOCS_SA }}

      - name: Fetch GCS credentials from Secret Manager
        run: |
          echo "GCS_KEY_ID=$(gcloud secrets versions access latest --secret=duckdb-reader-hmac-key-id)" >> "$GITHUB_ENV"
          echo "GCS_SECRET=$(gcloud secrets versions access latest --secret=duckdb-reader-hmac-secret)" >> "$GITHUB_ENV"

      - name: Pull catalog from stmsn-meta
        run: uv run python -c "from stmsn_catalog import pull_catalog; pull_catalog()"

      - name: Build dbt docs
        run: |
          uv run dbt deps --profiles-dir .github/ci-profiles
          uv run dbt docs generate \
            --no-partial-parse \
            --target prod \
            --profiles-dir profiles

      - name: Assemble site
        run: |
          mkdir -p _site
          cp target/index.html target/manifest.json target/catalog.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
